<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Космический Рывок | Space Dash</title>
    <!-- Yandex Games SDK -->
    <script src="/sdk.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-overlay">
        <!-- Главное меню -->
        <div id="main-menu" class="screen active">
            <h1 id="game-title">Космический Рывок</h1>
            <p id="game-subtitle">Уклоняйся от астероидов и собирай кристаллы!</p>
            <button id="btn-play" class="btn btn-primary">Играть</button>
            <button id="btn-leaderboard" class="btn btn-secondary">Рекорды</button>
            <div class="controls-info" id="controls-info">
                <p id="controls-desktop">Управление: ← → или A/D</p>
                <p id="controls-mobile">Управление: свайп или касание</p>
            </div>
            <div class="best-score" id="best-score-display">Лучший результат: <span id="best-score">0</span></div>
        </div>

        <!-- Экран паузы -->
        <div id="pause-screen" class="screen">
            <h2 id="pause-title">Пауза</h2>
            <button id="btn-resume" class="btn btn-primary">Продолжить</button>
            <button id="btn-quit" class="btn btn-secondary">В меню</button>
        </div>

        <!-- Экран Game Over -->
        <div id="gameover-screen" class="screen">
            <h2 id="gameover-title">Игра окончена!</h2>
            <p id="gameover-score-text">Счёт: <span id="final-score">0</span></p>
            <p id="gameover-best-text">Лучший: <span id="final-best">0</span></p>
            <p id="gameover-distance-text">Дистанция: <span id="final-distance">0</span> м</p>
            <button id="btn-revive" class="btn btn-reward">Возродиться (реклама)</button>
            <button id="btn-restart" class="btn btn-primary">Заново</button>
            <button id="btn-menu" class="btn btn-secondary">В меню</button>
        </div>

        <!-- Экран лидерборда -->
        <div id="leaderboard-screen" class="screen">
            <h2 id="lb-title">Таблица рекордов</h2>
            <div id="leaderboard-list"></div>
            <button id="btn-lb-back" class="btn btn-secondary">Назад</button>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div id="hud-score">0</div>
        <div id="hud-distance">0 м</div>
        <button id="btn-pause" class="btn-icon">⏸</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
