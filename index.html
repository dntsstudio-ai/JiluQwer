<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Космический Рывок | Space Dash</title>
    <!-- Yandex Games SDK -->
    <script src="/sdk.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- Кат-сцена (новелла) -->
    <div id="cutscene-overlay" class="overlay">
        <div id="cutscene-bg"></div>
        <div id="cutscene-dialog">
            <div id="cutscene-speaker"></div>
            <div id="cutscene-text"></div>
            <button id="cutscene-next" class="btn btn-small">Далее ▶</button>
        </div>
    </div>

    <!-- Главное меню -->
    <div id="main-menu" class="overlay active">
        <div class="menu-container">
            <h1 class="game-logo">Космический Рывок</h1>
            <div class="menu-buttons">
                <button id="btn-start" class="btn btn-primary btn-large">СТАРТ</button>
                <button id="btn-upgrades" class="btn btn-secondary">Улучшения</button>
                <button id="btn-skins" class="btn btn-secondary">Скины</button>
                <button id="btn-records" class="btn btn-secondary">Рекорды</button>
            </div>
            <div class="menu-balance">
                <span class="coin-icon">💎</span>
                <span id="menu-coins">0</span>
            </div>
        </div>
    </div>

    <!-- Экран улучшений -->
    <div id="upgrades-screen" class="overlay">
        <div class="panel">
            <h2>Улучшения корабля</h2>
            <div id="upgrades-list" class="upgrades-grid"></div>
            <div class="panel-footer">
                <div class="balance-display">💎 <span id="upgrades-coins">0</span></div>
                <button id="btn-ad-upgrade" class="btn btn-reward btn-small">📺 Смотреть рекламу (+1 улучшение)</button>
                <p id="ad-upgrade-info" class="hint">Доступно рекламных улучшений: <span id="ad-upgrades-left">2</span>/2</p>
                <button id="btn-upgrades-back" class="btn btn-secondary btn-small">Назад</button>
            </div>
        </div>
    </div>

    <!-- Экран скинов -->
    <div id="skins-screen" class="overlay">
        <div class="panel">
            <h2>Скины корабля</h2>
            <div id="skins-list" class="skins-grid"></div>
            <div class="panel-footer">
                <div class="balance-display">💎 <span id="skins-coins">0</span></div>
                <button id="btn-skins-back" class="btn btn-secondary btn-small">Назад</button>
            </div>
        </div>
    </div>

    <!-- Экран рекордов -->
    <div id="records-screen" class="overlay">
        <div class="panel">
            <h2>Таблица рекордов</h2>
            <div id="records-list" class="records-container"></div>
            <button id="btn-records-back" class="btn btn-secondary btn-small">Назад</button>
        </div>
    </div>

    <!-- Экран паузы -->
    <div id="pause-screen" class="overlay">
        <div class="panel panel-small">
            <h2>Пауза</h2>
            <button id="btn-resume" class="btn btn-primary">Продолжить</button>
            <button id="btn-quit" class="btn btn-secondary">В меню</button>
        </div>
    </div>

    <!-- Экран Game Over -->
    <div id="gameover-screen" class="overlay">
        <div class="panel">
            <h2 id="go-title">Корабль уничтожен!</h2>
            <div class="go-stats">
                <p>Дистанция: <span id="go-distance">0</span> м</p>
                <p>Собрано: <span id="go-crystals">0</span> 💎</p>
                <p>Рекорд: <span id="go-best">0</span> м</p>
            </div>
            <div class="go-buttons">
                <button id="btn-revive-ad" class="btn btn-reward">📺 Возродиться (реклама)</button>
                <button id="btn-revive-coins" class="btn btn-reward">💎 Возродиться (50 монет)</button>
                <button id="btn-restart" class="btn btn-primary">Заново</button>
                <button id="btn-go-menu" class="btn btn-secondary">В меню</button>
            </div>
        </div>
    </div>

    <!-- Обучение -->
    <div id="tutorial-overlay" class="overlay">
        <div id="tutorial-hint" class="tutorial-box">
            <p id="tutorial-text"></p>
            <div id="tutorial-arrow"></div>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div id="hud-left">
            <div id="hud-distance">0 м</div>
            <div id="hud-location"></div>
        </div>
        <div id="hud-center">
            <div id="hud-coins">💎 0</div>
        </div>
        <div id="hud-right">
            <button id="btn-pause" class="btn-icon">⏸</button>
        </div>
    </div>

    <!-- Индикатор эффектов -->
    <div id="effects-bar"></div>

    <script src="game.js"></script>
</body>
</html>
